# ============================================================
#         AndroidLab — Nginx Web Server Configuration
# ============================================================

worker_processes auto;
pid /data/data/com.termux/files/usr/var/run/nginx.pid;

error_log /data/data/com.termux/files/home/server/logs/nginx-error.log warn;

events {
    worker_connections 512;
    multi_accept on;
    use epoll;
}

http {
    # MIME Types
    include      /data/data/com.termux/files/usr/etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /data/data/com.termux/files/home/server/logs/nginx-access.log main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 200M;
    server_tokens off;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml
               application/json application/javascript
               application/rss+xml application/atom+xml
               image/svg+xml;

    # ── Main Website (Port 8080) ──────────────────────────
    server {
        listen 8080;
        server_name localhost;

        root /data/data/com.termux/files/home/server/www;
        index index.html index.php index.htm;

        # Static file serving with caching
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Main location block
        location / {
            try_files $uri $uri/ /index.html =404;
        }

        # PHP support (uncomment if PHP installed)
        # location ~ \.php$ {
        #     fastcgi_pass   127.0.0.1:9000;
        #     fastcgi_index  index.php;
        #     include        fastcgi_params;
        #     fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # }

        # API Proxy → Python Flask on port 5000
        location /api/ {
            proxy_pass         http://127.0.0.1:5000/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300;
        }

        # Node.js Proxy → Port 3000
        location /app/ {
            proxy_pass         http://127.0.0.1:3000/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
        }

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }

    # Include additional site configs (uncomment to enable)
    # include /data/data/com.termux/files/usr/etc/nginx/sites-enabled/*.conf;
}
